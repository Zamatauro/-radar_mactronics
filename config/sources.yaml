# ─── Configurazione globale ───

settings:
  # Cadenza bisettimanale (cron lun+gio):
  # • Lunedì copre ~96h (cattura weekend: ven→lun)
  # • Giovedì copre ~72h (lun→gio)
  max_age_hours_fast: 72
  max_age_hours_fast_monday: 96

  max_age_hours_slow: 168

  # Score minimo per entrare nell'email
  min_score: 5

  # Massimo articoli totali nell'email
  max_email_items: 10
